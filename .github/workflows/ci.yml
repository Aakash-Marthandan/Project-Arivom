name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Lint, typecheck, migrate, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.6
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arivom
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arivom
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations in order (fresh database)
        run: |
          for f in supabase/migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # Builds against the empty migrated DB: also exercises empty states.
      - run: npm run build

  pipelines:
    name: Pipelines lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - run: uv run ruff check .
