name: Editorial QA sample

on:
  workflow_dispatch:
  schedule:
    # Monday 03:30 UTC (09:00 IST): a weekly human read of displayed
    # titles, classes, and summaries (D-026).
    - cron: "30 3 * * 1"

jobs:
  sample:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Sample displayed content for human review
        run: uv run qa-sample | tee -a "$GITHUB_STEP_SUMMARY"
